# Tests for the {{role}} helper with metadata (hash params) support.
# The role helper accepts optional key=value hash parameters that become
# message-level metadata, e.g. {{role "user" purpose="preamble" foo="bar"}}

# Tests that role metadata (hash params) is passed through to message metadata.
- name: role_with_metadata
  template: |
    {{role "system" purpose="instructions"}}System instructions
    {{role "user" purpose="preamble" foo="bar"}}User preamble
  tests:
    - desc: renders role markers with metadata on messages
      expect:
        messages:
          [
            {
              role: "system",
              content: [{ text: "System instructions\n" }],
              metadata: { purpose: "instructions" },
            },
            {
              role: "user",
              content: [{ text: "User preamble\n" }],
              metadata: { purpose: "preamble", foo: "bar" },
            },
          ]

# Tests that roles without metadata still work alongside roles with metadata.
- name: role_mixed_metadata
  template: |
    {{role "system"}}System prompt
    {{role "user" purpose="preamble"}}User message
  tests:
    - desc: handles mixed roles with and without metadata
      expect:
        messages:
          [
            {
              role: "system",
              content: [{ text: "System prompt\n" }],
            },
            {
              role: "user",
              content: [{ text: "User message\n" }],
              metadata: { purpose: "preamble" },
            },
          ]
