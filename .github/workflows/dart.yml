name: "Dart checks"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            dart/**
            bazel/dart/**
            bazel/rules_dart/**
            spec/**
            .github/workflows/dart.yml

  format-check:
    needs: check-paths
    if: needs.check-paths.outputs.any_changed == 'true'
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        working-directory: dart/dotprompt
        run: dart pub get

      - name: Check formatting
        working-directory: dart/dotprompt
        run: dart format --set-exit-if-changed --output=none .

  analyze:
    needs: check-paths
    if: needs.check-paths.outputs.any_changed == 'true'
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        working-directory: dart/dotprompt
        run: dart pub get

      - name: Run analyzer with strict settings
        working-directory: dart/dotprompt
        run: dart analyze --fatal-infos --fatal-warnings

  test:
    needs: check-paths
    if: needs.check-paths.outputs.any_changed == 'true'
    name: Tests (${{ matrix.sdk }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        sdk: [stable, beta]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Get dependencies
        working-directory: dart/dotprompt
        run: dart pub get

      - name: Run tests
        working-directory: dart/dotprompt
        run: dart test

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.sdk == 'stable'
        working-directory: dart/dotprompt
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage

  bazel-build:
    needs: check-paths
    if: needs.check-paths.outputs.any_changed == 'true'
    name: Bazel Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Dart targets
        run: bazel build //dart/...

      - name: Run Dart tests via Bazel
        run: bazel test //dart/dotprompt/test:... --test_output=errors
        continue-on-error: true  # Tests may need network access

  dart-checks-all:
    if: always()
    needs: [format-check, analyze, test, bazel-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.format-check.result }}" == "failure" || \
                "${{ needs.analyze.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "Dart checks failed"
            exit 1
          fi
          echo "Dart checks passed or were skipped"
          exit 0
